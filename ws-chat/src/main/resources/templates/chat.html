<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 - 社交网络</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }
        .chat-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        .user-name {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: white;
        }
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: #f0f2f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        #messageInput:focus {
            border-color: #667eea;
        }
        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        #sendBtn:hover {
            transform: scale(1.05);
        }
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .typing-indicator {
            align-self: flex-start;
            padding: 10px 15px;
            background: #f0f2f5;
            border-radius: 18px;
            font-size: 12px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <a href="/home" class="back-btn">←</a>
            <div class="chat-user">
                <div class="avatar" th:text="${chatUser.username.substring(0,1).toUpperCase()}"></div>
                <div class="user-name" th:text="${chatUser.username}"></div>
            </div>
        </div>
    </div>
    
    <div class="chat-container">
        <div class="messages-area" id="messagesArea">
            <div th:each="message : ${messages}" 
                 th:class="${message.senderId == currentUser.id} ? 'message sent' : 'message received'">
                <div th:text="${message.content}"></div>
                <div class="message-time" th:text="${message.timestamp}"></div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">对方正在输入...</div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        const currentUserId = /*[[${currentUser.id}]]*/ null;
        const currentUserName = /*[[${currentUser.username}]]*/ null;
        const chatUserId = /*[[${chatUser.id}]]*/ null;
        const chatUserName = /*[[${chatUser.username}]]*/ null;

        let stompClient = null;
        let connectionAttempts = 0;

        function connect() {
            console.log('Connecting to WebSocket... attempt:', ++connectionAttempts);
            console.log('SockJS available:', typeof SockJS !== 'undefined');
            console.log('Stomp available:', typeof Stomp !== 'undefined');
            
            try {
                const socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);
                stompClient.debug = function(str) {
                    console.log('STOMP:', str);
                };
                
                stompClient.connect({}, function(frame) {
                    console.log('Connected successfully:', frame);
                    console.log('STOMP client connected:', stompClient.connected);
                    
                    stompClient.subscribe('/topic/messages', function(messageOutput) {
                        console.log('Received message from topic:', messageOutput.body);
                        const message = JSON.parse(messageOutput.body);
                        
                        if ((message.senderId == currentUserId && message.receiverId == chatUserId) ||
                            (message.senderId == chatUserId && message.receiverId == currentUserId)) {
                            
                            if (message.senderId == currentUserId) {
                                console.log('Skipping own message from server broadcast');
                                return;
                            }
                            showMessage(message, false);
                        }
                    });
                    
                }, function(error) {
                    console.error('WebSocket connection error:', error);
                    console.log('STOMP client state after error:', stompClient ? stompClient.connected : 'null');
                });
            } catch (e) {
                console.error('Exception during connect:', e);
            }
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value.trim();
            console.log('Sending message:', content);
            console.log('stompClient:', stompClient);
            console.log('stompClient.connected:', stompClient ? stompClient.connected : 'null');
            
            if (!content) {
                console.error('Message content is empty');
                return;
            }
            
            const message = {
                senderId: currentUserId,
                senderName: currentUserName,
                receiverId: chatUserId,
                receiverName: chatUserName,
                content: content
            };
            
            if (stompClient && stompClient.connected) {
                try {
                    console.log('Sending via WebSocket to /app/chat:', JSON.stringify(message));
                    stompClient.send("/app/chat", {}, JSON.stringify(message));
                    console.log('Message sent via WebSocket successfully');
                    document.getElementById('messageInput').value = '';
                    showMessage(message, true);
                } catch (error) {
                    console.error('Error sending WebSocket message:', error);
                    sendMessageViaHttp(message);
                }
            } else {
                console.log('WebSocket not connected, sending via HTTP fallback');
                sendMessageViaHttp(message);
            }
        }
        
        function sendMessageViaHttp(message) {
            console.log('Sending via HTTP:', JSON.stringify(message));
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(message)
            })
            .then(response => {
                console.log('HTTP response status:', response.status);
                if (!response.ok) {
                    throw new Error('HTTP error, status = ' + response.status);
                }
                return response.json();
            })
            .then(data => {
                console.log('Message sent via HTTP successfully:', data);
                document.getElementById('messageInput').value = '';
                showMessage(message, true);
            })
            .catch((error) => {
                console.error('Error sending HTTP message:', error);
                alert('发送消息失败: ' + error.message);
            });
        }

        function showMessage(message, isLocal = false) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = message.senderId == currentUserId ? 'message sent' : 'message received';
            
            const now = new Date();
            const time = now.getFullYear() + '-' + 
                        String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(now.getDate()).padStart(2, '0') + ' ' +
                        String(now.getHours()).padStart(2, '0') + ':' + 
                        String(now.getMinutes()).padStart(2, '0');
            
            messageDiv.innerHTML = `
                <div>${message.content}</div>
                <div class="message-time">${time}</div>
            `;
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            console.log('Message displayed', isLocal ? '(local)' : '(from server)');
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, attempting connection...');
            connect();
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    </script>
</body>
</html>
